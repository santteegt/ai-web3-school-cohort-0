name: Diagnostics

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v
        env:
          # Tests must not touch real RPC or external APIs
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}

  diagnostics-gate:
    name: Gate — All Checks Pass
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All diagnostics passed"
