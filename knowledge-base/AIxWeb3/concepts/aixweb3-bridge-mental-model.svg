<svg width="1300" height="510" viewBox="0 0 1300 510"
  xmlns="http://www.w3.org/2000/svg"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <!-- Forward arrowhead (marker-end) -->
    <marker id="ah-gray" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1.5 L8,5 L0,8.5 Z" fill="#94a3b8"/>
    </marker>
    <!-- Backward arrowhead (marker-start on fwd line = points left) -->
    <marker id="ah-gray-bwd" viewBox="0 0 10 10" refX="2" refY="5"
      markerWidth="5" markerHeight="5" orient="auto">
      <path d="M10,1.5 L2,5 L10,8.5 Z" fill="#94a3b8"/>
    </marker>
    <marker id="ah-indigo" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1.5 L8,5 L0,8.5 Z" fill="#818CF8"/>
    </marker>
    <marker id="ah-sky" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1.5 L8,5 L0,8.5 Z" fill="#38BDF8"/>
    </marker>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="1300" height="510" fill="#f1f5f9"/>

  <!-- ═══ HEADER ═══ -->
  <text x="650" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">AI × Web3 Bridge — System Mental Model</text>
  <text x="650" y="46" text-anchor="middle" font-size="11" fill="#94a3b8">Execution flow · Standards · Key design principles</text>

  <!-- ═══ LAYER LABELS ═══ -->
  <text x="62" y="75" font-size="8.5" font-weight="700" fill="#cbd5e1" letter-spacing="2">EXECUTION LAYER  ➜</text>
  <text x="62" y="358" font-size="8.5" font-weight="700" fill="#cbd5e1" letter-spacing="2">IDENTITY &amp; TRUST FOUNDATION</text>

  <!-- ═══ DIVIDER between layers ═══ -->
  <line x1="62" y1="280" x2="1238" y2="280" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ══════════════════════════════════════════
       ARROWS  (drawn before nodes so nodes sit on top)
  ══════════════════════════════════════════ -->

  <!-- Execution spine arrows (horizontal, y=141) -->
  <!-- N1 ↔ N2 (bidirectional — tools populate context AND context drives tool calls) -->
  <line x1="232" y1="141" x2="268" y2="141" stroke="#94a3b8" stroke-width="2"
    marker-start="url(#ah-gray-bwd)" marker-end="url(#ah-gray)"/>

  <!-- N2 → N3 -->
  <line x1="432" y1="141" x2="468" y2="141" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah-gray)"/>
  <!-- N3 → N4 -->
  <line x1="632" y1="141" x2="668" y2="141" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah-gray)"/>
  <!-- N4 → N5 -->
  <line x1="832" y1="141" x2="868" y2="141" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah-gray)"/>
  <!-- N5 → N6 -->
  <line x1="1032" y1="141" x2="1068" y2="141" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah-gray)"/>

  <!-- Cross-layer: IDENTITY connections (indigo) -->
  <!-- N7 → N3: vertical (agent identity authorizes workflow execution) -->
  <line x1="550" y1="373" x2="550" y2="190" stroke="#818CF8" stroke-width="1.8"
    stroke-dasharray="5,3" marker-end="url(#ah-indigo)"/>

  <!-- N7 → N4: bezier (wallet is the primary on-chain identity anchor) -->
  <path d="M 632,423 Q 700,306 750,190" stroke="#818CF8" stroke-width="1.8"
    fill="none" marker-end="url(#ah-indigo)"/>

  <!-- N7 → N8: horizontal (identity is prerequisite for accumulating reputation) -->
  <line x1="632" y1="423" x2="868" y2="423" stroke="#818CF8" stroke-width="1.8"
    marker-end="url(#ah-indigo)"/>

  <!-- Cross-layer: TRUST connections (sky blue) -->
  <!-- N8 → N5: vertical (trust layer informs who can be payment counterparty) -->
  <line x1="950" y1="373" x2="950" y2="190" stroke="#38BDF8" stroke-width="1.8"
    stroke-dasharray="5,3" marker-end="url(#ah-sky)"/>

  <!-- N8 ↔ N6: bezier (escrow evidence builds reputation; trust shortcuts acceptance) -->
  <path d="M 1032,423 Q 1100,306 1150,190" stroke="#38BDF8" stroke-width="1.8"
    fill="none" stroke-dasharray="5,3" marker-end="url(#ah-sky)"/>

  <!-- ══════════════════════════════════════════
       NODES
  ══════════════════════════════════════════ -->

  <!-- ── N1: Chain-aware Context ── -->
  <rect x="70" y="93" width="162" height="96" rx="10" fill="#1D4ED8" filter="url(#shadow)"/>
  <text x="151" y="109" text-anchor="middle" font-size="8" fill="#BFDBFE" font-weight="700" letter-spacing="1.8">DATA LAYER</text>
  <text x="151" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="white">Chain-aware</text>
  <text x="151" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="white">Context</text>
  <text x="151" y="163" text-anchor="middle" font-size="8" fill="#93C5FD">JSON-RPC · The Graph</text>
  <text x="151" y="175" text-anchor="middle" font-size="8" fill="#93C5FD">Block Explorer API</text>

  <!-- ── N2: Web3 Tool Use ── -->
  <rect x="270" y="93" width="162" height="96" rx="10" fill="#047857" filter="url(#shadow)"/>
  <text x="351" y="109" text-anchor="middle" font-size="8" fill="#A7F3D0" font-weight="700" letter-spacing="1.8">TOOLING LAYER</text>
  <text x="351" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="white">Web3</text>
  <text x="351" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="white">Tool Use</text>
  <text x="351" y="163" text-anchor="middle" font-size="8" fill="#6EE7B7">MCP · JSON-RPC</text>
  <text x="351" y="175" text-anchor="middle" font-size="8" fill="#6EE7B7">ERC-7231</text>

  <!-- ── N3: Agent Workflow ── -->
  <rect x="470" y="93" width="162" height="96" rx="10" fill="#92400E" filter="url(#shadow)"/>
  <text x="551" y="109" text-anchor="middle" font-size="8" fill="#FDE68A" font-weight="700" letter-spacing="1.8">ORCHESTRATION</text>
  <text x="551" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="white">Agent</text>
  <text x="551" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="white">Workflow</text>
  <text x="551" y="163" text-anchor="middle" font-size="8" fill="#FDE68A">LangGraph · FSM · A2A</text>
  <text x="551" y="175" text-anchor="middle" font-size="8" fill="#FDE68A">human-in-the-loop</text>

  <!-- ── N4: Agent Wallet ── -->
  <rect x="670" y="93" width="162" height="96" rx="10" fill="#9A3412" filter="url(#shadow)"/>
  <text x="751" y="109" text-anchor="middle" font-size="8" fill="#FED7AA" font-weight="700" letter-spacing="1.8">EXECUTION</text>
  <text x="751" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="white">Agent</text>
  <text x="751" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="white">Wallet</text>
  <text x="751" y="163" text-anchor="middle" font-size="8" fill="#FED7AA">ERC-4337 · EIP-7702</text>
  <text x="751" y="175" text-anchor="middle" font-size="8" fill="#FED7AA">Session Keys</text>

  <!-- ── N5: Machine Payment ── -->
  <rect x="870" y="93" width="162" height="96" rx="10" fill="#5B21B6" filter="url(#shadow)"/>
  <text x="951" y="109" text-anchor="middle" font-size="8" fill="#DDD6FE" font-weight="700" letter-spacing="1.8">FINANCIAL</text>
  <text x="951" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="white">Machine</text>
  <text x="951" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="white">Payment</text>
  <text x="951" y="163" text-anchor="middle" font-size="8" fill="#C4B5FD">x402 · MPP</text>
  <text x="951" y="175" text-anchor="middle" font-size="8" fill="#C4B5FD">L2 payment channels</text>

  <!-- ── N6: Settlement & Escrow ── -->
  <rect x="1070" y="93" width="162" height="96" rx="10" fill="#9D174D" filter="url(#shadow)"/>
  <text x="1151" y="109" text-anchor="middle" font-size="8" fill="#FBCFE8" font-weight="700" letter-spacing="1.8">SETTLEMENT</text>
  <text x="1151" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="white">Settlement</text>
  <text x="1151" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="white">&amp; Escrow</text>
  <text x="1151" y="163" text-anchor="middle" font-size="8" fill="#FBCFE8">ERC-8183 · State machine</text>
  <text x="1151" y="175" text-anchor="middle" font-size="8" fill="#FBCFE8">Delivery proof</text>

  <!-- ── N7: Agent Identity ── -->
  <rect x="470" y="375" width="162" height="96" rx="10" fill="#3730A3" filter="url(#shadow)"/>
  <text x="551" y="391" text-anchor="middle" font-size="8" fill="#C7D2FE" font-weight="700" letter-spacing="1.8">IDENTITY</text>
  <text x="551" y="408" text-anchor="middle" font-size="13" font-weight="700" fill="white">Agent</text>
  <text x="551" y="424" text-anchor="middle" font-size="13" font-weight="700" fill="white">Identity</text>
  <text x="551" y="445" text-anchor="middle" font-size="8" fill="#A5B4FC">DID/VC · A2A</text>
  <text x="551" y="457" text-anchor="middle" font-size="8" fill="#A5B4FC">ERC-8004</text>

  <!-- ── N8: Agent Trust & Reputation ── -->
  <rect x="870" y="375" width="162" height="96" rx="10" fill="#0369A1" filter="url(#shadow)"/>
  <text x="951" y="391" text-anchor="middle" font-size="8" fill="#BAE6FD" font-weight="700" letter-spacing="1.8">TRUST</text>
  <text x="951" y="408" text-anchor="middle" font-size="13" font-weight="700" fill="white">Agent Trust &amp;</text>
  <text x="951" y="424" text-anchor="middle" font-size="13" font-weight="700" fill="white">Reputation</text>
  <text x="951" y="445" text-anchor="middle" font-size="8" fill="#7DD3FC">ERC-8004 · EAS</text>
  <text x="951" y="457" text-anchor="middle" font-size="8" fill="#7DD3FC">Attestations</text>

  <!-- ══════════════════════════════════════════
       RELATIONSHIP LABELS (on top of arrows)
  ══════════════════════════════════════════ -->

  <!-- N1↔N2: data flow label -->
  <rect x="207" y="127" width="54" height="14" rx="4" fill="white" opacity="0.9"/>
  <text x="234" y="137.5" text-anchor="middle" font-size="8" fill="#475569" font-weight="600">data flow</text>

  <!-- N7→N3: "authorizes" -->
  <rect x="557" y="270" width="58" height="14" rx="4" fill="white" opacity="0.9"/>
  <text x="586" y="280.5" text-anchor="middle" font-size="8" fill="#6366F1" font-weight="600">authorizes</text>

  <!-- N7→N4: "anchors id." -->
  <rect x="658" y="297" width="60" height="14" rx="4" fill="white" opacity="0.9"/>
  <text x="688" y="307.5" text-anchor="middle" font-size="8" fill="#6366F1" font-weight="600">anchors id.</text>

  <!-- N7→N8: "prerequisite" -->
  <rect x="714" y="411" width="68" height="14" rx="4" fill="white" opacity="0.9"/>
  <text x="748" y="421.5" text-anchor="middle" font-size="8" fill="#6366F1" font-weight="600">prerequisite</text>

  <!-- N8→N5: "informs" -->
  <rect x="958" y="270" width="44" height="14" rx="4" fill="white" opacity="0.9"/>
  <text x="980" y="280.5" text-anchor="middle" font-size="8" fill="#0284C7" font-weight="600">informs</text>

  <!-- N8→N6: "evidence" -->
  <rect x="1063" y="297" width="50" height="14" rx="4" fill="white" opacity="0.9"/>
  <text x="1088" y="307.5" text-anchor="middle" font-size="8" fill="#0284C7" font-weight="600">evidence</text>

  <!-- ══════════════════════════════════════════
       LEGEND
  ══════════════════════════════════════════ -->
  <text x="62" y="487" font-size="8.5" font-weight="700" fill="#94a3b8" letter-spacing="1.5">ARROW LEGEND</text>
  <!-- solid gray -->
  <line x1="160" y1="484" x2="195" y2="484" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah-gray)"/>
  <text x="200" y="487" font-size="8.5" fill="#475569">Execution flow</text>
  <!-- dashed indigo -->
  <line x1="310" y1="484" x2="345" y2="484" stroke="#818CF8" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#ah-indigo)"/>
  <text x="350" y="487" font-size="8.5" fill="#475569">Identity enables</text>
  <!-- solid indigo -->
  <line x1="460" y1="484" x2="495" y2="484" stroke="#818CF8" stroke-width="1.8" marker-end="url(#ah-indigo)"/>
  <text x="500" y="487" font-size="8.5" fill="#475569">Identity anchors (direct)</text>
  <!-- dashed sky -->
  <line x1="660" y1="484" x2="695" y2="484" stroke="#38BDF8" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#ah-sky)"/>
  <text x="700" y="487" font-size="8.5" fill="#475569">Trust informs / provides evidence</text>
  <!-- bidir -->
  <line x1="920" y1="484" x2="955" y2="484" stroke="#94a3b8" stroke-width="2" marker-start="url(#ah-gray-bwd)" marker-end="url(#ah-gray)"/>
  <text x="960" y="487" font-size="8.5" fill="#475569">Bidirectional (data flow)</text>

</svg>
