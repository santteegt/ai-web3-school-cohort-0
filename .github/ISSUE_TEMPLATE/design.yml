name: "Design — Technical Blueprint"
description: "Technical design for a defined feature before development starts"
labels: ["7d:design", "status:designing"]
body:
  - type: input
    id: definition_link
    attributes:
      label: "Definition issue"
      placeholder: "#15"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - "OrchestratorServer (src/orchestrator/server.py)"
        - "OrchestratorTools (src/orchestrator/tools.py)"
        - "SpecialistAgent (src/specialist/agent.py)"
        - "A2AClient (src/shared/a2a.py)"
        - "ERC8004 (src/shared/erc8004.py)"
        - "AgentFightClub (src/shared/agentfightclub.py)"
        - "GuildContext (src/shared/guild_context.py)"
        - "HumanGates (src/cli/gates.py)"
        - "New component (describe below)"
    validations:
      required: true

  - type: textarea
    id: interface
    attributes:
      label: "Interface / API design"
      description: "Function signatures, A2A message schema, or MCP tool JSON schema"
      value: |
        ```python
        # Example
        async def send_task_invite(specialist_endpoint: str, task_spec: dict) -> str:
            ...
        ```
    validations:
      required: true

  - type: textarea
    id: data_model
    attributes:
      label: "Data model / state changes"
      description: "guild_context.json fields affected, on-chain event emitted, or JSON schema"

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives considered"
      value: |
        | Option | Why rejected |
        |--------|-------------|
        | | |

  - type: textarea
    id: security
    attributes:
      label: "Security / caller constraints"
      placeholder: |
        - giveFeedback() caller: guild contract or Marco's EOA — NOT Specialist wallet
        - No private keys in source files
        - Gate must halt before any on-chain call

  - type: checkboxes
    id: design_review
    attributes:
      label: "Design review checklist"
      options:
        - label: "No hardcoded private keys or API keys"
        - label: "Base Sepolia only — no mainnet call path"
        - label: "All A2A messages logged to ./logs/"
        - label: "Human gate halts execution before irreversible on-chain action"
        - label: "Fallback path documented if external dependency is unavailable"
