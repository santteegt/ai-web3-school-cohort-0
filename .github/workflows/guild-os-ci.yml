name: GuildOS CI

on:
  pull_request:
    paths:
      - "hackathon/guild-os/**"

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hackathon/guild-os

    steps:
      - uses: actions/checkout@v4

      - name: Detect src/ changes
        uses: dorny/paths-filter@v3
        id: src-changed
        with:
          filters: |
            src:
              - 'hackathon/guild-os/src/**'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: make lint

      - name: Test (with coverage)
        if: steps.src-changed.outputs.src == 'true'
        run: make test

      - name: Coverage summary
        if: steps.src-changed.outputs.src == 'true' && !cancelled()
        run: |
          echo "### Coverage — \`src/\`" >> "$GITHUB_STEP_SUMMARY"
          uv run coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Test (no coverage)
        if: steps.src-changed.outputs.src != 'true'
        run: make test-no-cov
